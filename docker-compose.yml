services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poland_landfinder}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./seeds:/seeds
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./seeds:/seeds
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.example
    command: npm run dev
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:

